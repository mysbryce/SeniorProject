name: Release Raspberry Pi Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload the asset to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-24.04-arm
    env:
      PYTHON_VERSION: "3.12"
      APP_NAME: rose-chat
      DIST_DIR: dist/rose-chat
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pywebview[gtk]" pyinstaller

      - name: Build PyInstaller binary
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --name "${APP_NAME}" \
            --onedir \
            --add-data "web:web" \
            main.py

      - name: Create UUID zip name
        id: asset
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import uuid
          print(f"name={uuid.uuid4()}.zip")
          PY

      - name: Archive build output
        shell: bash
        run: |
          cd dist
          zip -r "${{ steps.asset.outputs.name }}" "${APP_NAME}"

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" "dist/${{ steps.asset.outputs.name }}" --clobber
